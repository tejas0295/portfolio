<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoonify AI - Transform Your Photos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .hero-section { padding: 80px 0; text-align: center; background: linear-gradient(180deg, #fff 0%, #f0f4ff 100%); }
        .upload-box { border: 2px dashed #6c5ce7; border-radius: 20px; padding: 40px; background: #fff; transition: 0.3s; cursor: pointer; }
        .upload-box:hover { background: #f1f0ff; }
        .style-card { border: none; border-radius: 15px; overflow: hidden; transition: transform 0.3s; cursor: pointer; }
        .style-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .style-card.active { border: 3px solid #6c5ce7; }
        .btn-primary { background-color: #6c5ce7; border: none; padding: 12px 30px; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">Cartoonify AI</a>
            <button class="btn btn-primary btn-sm">Start Converting</button>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Transform Your Photos into <span class="text-primary">Stunning Cartoons</span></h1>
            <p class="lead text-muted mb-5">Convert any photo into beautiful cartoon art with our advanced AI in seconds.</p>
            
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="upload-box shadow-sm mb-4" id="dropZone">
                        <input type="file" id="fileInput" hidden accept="image/*">
                        <div class="py-4">
                            <h4 class="fw-bold">Upload Image</h4>
                            <p class="text-muted">Drag & drop or click to browse (JPG, PNG, WebP)</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold">Choose Your Style</h3>
                <span class="badge bg-secondary">80+ Styles Available</span>
            </div>
            
            <div class="row g-4" id="styleGrid">
                <div class="col-6 col-md-3">
                    <div class="card style-card shadow-sm active">
                        <img src="https://via.placeholder.com/200x200?text=Pixar" class="card-img-top" alt="Pixar">
                        <div class="card-body text-center p-2"><p class="mb-0 fw-bold">Pixar Art</p></div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card style-card shadow-sm">
                        <img src="https://via.placeholder.com/200x200?text=Anime" class="card-img-top" alt="Anime">
                        <div class="card-body text-center p-2"><p class="mb-0 fw-bold">Anime</p></div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card style-card shadow-sm">
                        <img src="https://via.placeholder.com/200x200?text=PopArt" class="card-img-top" alt="PopArt">
                        <div class="card-body text-center p-2"><p class="mb-0 fw-bold">Pop Art</p></div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card style-card shadow-sm">
                        <img src="https://via.placeholder.com/200x200?text=Sketch" class="card-img-top" alt="Sketch">
                        <div class="card-body text-center p-2"><p class="mb-0 fw-bold">Sketchbook</p></div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <button class="btn btn-primary btn-lg shadow" id="convertBtn">Convert to Cartoon</button>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple UI logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const fileName = e.target.files[0].name;
            dropZone.querySelector('p').innerText = `Selected: ${fileName}`;
        };

        document.querySelectorAll('.style-card').forEach(card => {
            card.onclick = () => {
                document.querySelector('.style-card.active').classList.remove('active');
                card.classList.add('active');
            };
        });

        document.getElementById('convertBtn').onclick = () => {
            alert('Processing your image with AI...');
        };
    </script>
</body>
</html>
