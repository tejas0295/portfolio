<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
  <style>
    body {
  background: #f8f9fa;
}

.cart-item {
  background: #fff;
  padding: 15px 20px;
  border-radius: 6px;
}

.qty-input {
  width: 70px;
  text-align: center;
}

.checkout-form {
  background: #fff;
  padding: 25px;
  border-radius: 6px;
}

  </style>
</head>
<body>

<div class="container py-5">

  <h2 class="mb-4">Shopping Cart</h2>

  <!-- CART ITEMS -->
  <div class="cart-item d-flex justify-content-between align-items-center">
    <div>
      <h6>Asgaard Sofa</h6>
      <small>₹ 250,000</small>
    </div>

    <input type="number" class="qty-input" value="1" min="1" data-price="250000">

    <strong>₹ <span class="item-subtotal">250000</span></strong>
  </div>

  <hr>

  <div class="cart-item d-flex justify-content-between align-items-center">
    <div>
      <h6>Wooden Chair</h6>
      <small>₹ 45,000</small>
    </div>

    <input type="number" class="qty-input" value="1" min="1" data-price="45000">

    <strong>₹ <span class="item-subtotal">45000</span></strong>
  </div>

  <hr>

  <!-- TOTAL -->
  <div class="d-flex justify-content-between fs-5 mt-4">
    <strong>Total</strong>
    <strong>₹ <span id="cartTotal">0</span></strong>
  </div>

  <!-- CHECKOUT -->
  <form class="checkout-form mt-5">
    <h4>Checkout</h4>

    <input type="hidden" id="cartTotalInput">

    <div class="mb-3">
      <label>Name</label>
      <input type="text" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" required>
    </div>

    <button class="btn btn-dark w-100">Place Order</button>
  </form>

</div>

<!-- JS -->
<script src="cart.js"></script>
<script>
  function updateCartTotal() {
  let total = 0;

  document.querySelectorAll(".cart-item").forEach(item => {
    const qtyInput = item.querySelector(".qty-input");
    const price = Number(qtyInput.dataset.price);
    const qty = Number(qtyInput.value);

    const subtotal = price * qty;
    item.querySelector(".item-subtotal").textContent =
      subtotal.toLocaleString();

    total += subtotal;
  });

  document.getElementById("cartTotal").textContent =
    total.toLocaleString();

  document.getElementById("cartTotalInput").value = total;
}

// Quantity change listener
document.querySelectorAll(".qty-input").forEach(input => {
  input.addEventListener("input", updateCartTotal);
});

// Initial calculation
updateCartTotal();

</script>
</body>
</html>
